<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#121212" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="情書" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="manifest" href="%BASE_URL%manifest.json" />
    <link rel="icon" type="image/png" sizes="192x192" href="%BASE_URL%icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%BASE_URL%icons/apple-touch-icon.png" />
    <title>情書 (Love Letter) - TS 版</title>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('%BASE_URL%sw.js', { scope: '%BASE_URL%' })
            .catch(error => console.warn('Service worker registration failed:', error));
        });
      }
    </script>
  </head>
  <body>
    <div id="app">
      <h1>情書 Love Letter</h1>
      
      <!-- 主選單區域 -->
      <div id="main-menu" class="area menu-container">
        <h2>主選單</h2>
        <div class="menu-buttons">
          <button id="start-game-btn" class="menu-btn primary">開始遊戲</button>
          <button id="show-rules-btn" class="menu-btn">遊戲說明</button>
        </div>
      </div>

      <!-- 模式選擇區域 -->
      <div id="mode-select" class="area menu-container" style="display: none;">
        <h2>選擇遊戲模式</h2>
        <div class="menu-buttons">
          <button id="online-mode-btn" class="menu-btn primary">多人連線大廳 <br><small>Colyseus 房間等待系統</small></button>
          <button id="local-mode-btn" class="menu-btn primary">電腦對戰 (單機模式)</button>
          <button id="back-to-menu-btn" class="menu-btn secondary">返回</button>
        </div>
      </div>

      <!-- 電腦人數選擇 -->
      <div id="bot-count-select" class="area menu-container" style="display: none;">
        <h2>請選擇電腦對手人數</h2>
        <div class="menu-buttons count-buttons">
          <button class="count-btn" data-count="1">1 人</button>
          <button class="count-btn" data-count="2">2 人</button>
          <button class="count-btn" data-count="3">3 人</button>
        </div>
        <button id="back-to-mode-btn" class="menu-btn secondary" style="margin-top: 20px;">返回</button>
      </div>

      <!-- 多人連線大廳 -->
      <div id="lobby-scene" class="area lobby-scene" style="display: none;">
        <div class="scene-header">
          <div>
            <h2>多人連線大廳</h2>
            <p>建立或加入一個 2-4 人的情書房間。</p>
          </div>
          <button id="back-to-mode-from-lobby-btn" class="menu-btn secondary">返回</button>
        </div>

        <div class="lobby-actions">
          <button id="create-room-btn" class="menu-btn primary">創建房間</button>
          <button id="refresh-room-list-btn" class="menu-btn secondary">重新整理</button>
        </div>

        <div id="room-list-container" class="room-list-container" aria-live="polite"></div>
      </div>

      <!-- 房間等待畫面 -->
      <div id="room-wait-scene" class="area room-wait-scene" style="display: none;">
        <div class="scene-header">
          <div>
            <h2>房間等待中</h2>
            <p>房間 ID：<strong id="current-room-id">-</strong></p>
          </div>
          <span id="room-player-count" class="room-count-badge">0/4</span>
        </div>

        <div id="room-player-list" class="room-player-list" aria-live="polite"></div>

        <div class="room-wait-actions">
          <button id="leave-room-btn" class="menu-btn secondary">離開房間</button>
          <button id="ready-toggle-btn" class="menu-btn primary">準備</button>
        </div>
      </div>

      <!-- 遊戲場景 -->
      <div id="game-scene" style="display: none;">
        <div class="card-stats-area area">
          <h3>出牌統計</h3>
          <div id="played-card-stats" class="played-card-stats"></div>
        </div>
        <!-- 左側/主戰區 -->
        <div class="main-battle-area">
          <!-- 對手區域 (動態生成) -->
          <div id="opponents-container"></div>

          <!-- 玩家區域 -->
          <div id="player-area" class="area">
            <h3>玩家狀態</h3>
            <div id="player-discard" class="discard-container"></div>
            <div id="player-hand" class="hand-container"></div>
          </div>
        </div>

        <!-- 右側/日誌區 (側邊欄) -->
        <div class="sidebar-area">
          <div id="game-info-area" class="area">
            <div class="stats">
              <div class="stats-row">
                <div id="turn-indicator">當前回合：玩家</div>
                <span id="deck-count">牌堆剩餘：0</span>
              </div>
              <button id="draw-btn">抽牌</button>
              <button id="show-result-btn" class="result-btn" style="display: none;">查看結果</button>
              <button id="show-log-btn" class="menu-btn secondary">&#26597;&#30475;&#23565;&#25136;&#32000;&#37636;</button>
              <button id="back-home-btn" class="menu-btn secondary" style="padding: 5px 15px; width: 100%;">回主選單</button>
            </div>
            <div id="game-log" class="log-container">
              <p>[系統] 遊戲準備就緒</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 全域 Modal 彈窗 -->
    <div id="modal-overlay" class="modal-overlay" style="display: none;">
      <div id="modal-content" class="modal-content">
        <h2 id="modal-title">標題</h2>
        <div id="modal-body">
          <!-- 內容會由 JS 動態生成 -->
        </div>
        <div id="modal-footer" style="margin-top: 20px;">
          <!-- 按鈕 -->
        </div>
      </div>
    </div>

    <div id="pwa-install-prompt" style="position: fixed; left: 1rem; right: 1rem; bottom: calc(1rem + env(safe-area-inset-bottom)); z-index: 2000; display: none; align-items: center; justify-content: space-between; gap: 0.75rem; padding: 0.85rem 1rem; border: 1px solid rgba(255,77,77,0.55); border-radius: 10px; background: rgba(18,18,18,0.96); box-shadow: 0 10px 28px rgba(0,0,0,0.45); color: #f4f4f4;">
      <span style="font-weight: 700; line-height: 1.35;">將《情書》安裝到主畫面</span>
      <div style="display: flex; gap: 0.5rem; flex-shrink: 0;">
        <button id="pwa-install-btn" style="padding: 0.55rem 0.85rem; border: 0; border-radius: 6px; background: #ff4d4d; color: #fff; font-weight: 800;">安裝</button>
        <button id="pwa-dismiss-btn" style="padding: 0.55rem 0.85rem; border: 0; border-radius: 6px; background: #57606f; color: #fff; font-weight: 800;">稍後</button>
      </div>
    </div>

    <script>
      let deferredInstallPrompt = null;
      const installPrompt = document.getElementById('pwa-install-prompt');
      const installButton = document.getElementById('pwa-install-btn');
      const dismissButton = document.getElementById('pwa-dismiss-btn');

      window.addEventListener('beforeinstallprompt', event => {
        event.preventDefault();
        deferredInstallPrompt = event;
        installPrompt.style.display = 'flex';
      });

      installButton?.addEventListener('click', async () => {
        if (!deferredInstallPrompt) return;
        installPrompt.style.display = 'none';
        deferredInstallPrompt.prompt();
        await deferredInstallPrompt.userChoice;
        deferredInstallPrompt = null;
      });

      dismissButton?.addEventListener('click', () => {
        installPrompt.style.display = 'none';
      });

      window.addEventListener('appinstalled', () => {
        installPrompt.style.display = 'none';
        deferredInstallPrompt = null;
      });
    </script>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
