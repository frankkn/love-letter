<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>情書 (Love Letter) - TS 版</title>
  </head>
  <body>
    <div id="app">
      <h1>情書 Love Letter</h1>
      
      <!-- AI 區域 -->
      <div id="ai-area" class="area">
        <h3>AI 狀態</h3>
        <div id="ai-hand" class="hand-container"></div>
        <div id="ai-discard" class="discard-container"></div>
      </div>

      <!-- 遊戲資訊與日誌 -->
      <div id="game-info-area" class="area">
        <div class="stats">
          <div id="turn-indicator">當前回合：玩家</div>
          <span id="deck-count">牌堆剩餘：0</span>
          <button id="draw-btn">抽牌</button>
          <button id="restart-btn" style="display:none;">重新開始</button>
        </div>
        <div id="game-log" class="log-container">
          <p>[系統] 遊戲準備就緒</p>
        </div>
      </div>

      <!-- 玩家區域 -->
      <div id="player-area" class="area">
        <h3>玩家狀態</h3>
        <div id="player-hand" class="hand-container"></div>
        <div id="player-discard" class="discard-container"></div>
      </div>
    </div>

    <!-- 全域 Modal 彈窗 -->
    <div id="modal-overlay" class="modal-overlay" style="display: none;">
      <div id="modal-content" class="modal-content">
        <h2 id="modal-title">標題</h2>
        <div id="modal-body">
          <!-- 內容會由 JS 動態生成 -->
        </div>
        <div id="modal-footer" style="margin-top: 20px;">
          <!-- 按鈕 -->
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
