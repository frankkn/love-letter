<!DOCTYPE html>
<html lang="zh-TW" id="html-root">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="icon" type="image/png" sizes="192x192" href="%BASE_URL%icons/icon-192.png" />
    <title>情書 (Love Letter) - TS 版</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:ital,wght@0,400;0,600;1,400&family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
    <script>
      // Unregister any leftover PWA service workers from previous versions.
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(regs => {
          regs.forEach(r => r.unregister());
        });
      }
    </script>
  </head>
  <body>
    <!-- Splash / intro screen — dismissed on first click/tap, unlocks audio -->
    <div id="splash-screen" aria-label="點擊任意處開始">
      <img src="%BASE_URL%splash.webp" alt="" draggable="false" />
    </div>

    <!-- Background decoration layers (menu atmosphere) -->
    <div class="bg-layer" aria-hidden="true"></div>
    <div class="bg-texture" aria-hidden="true"></div>
    <div class="bg-vignette" aria-hidden="true"></div>
    <canvas id="particle-canvas" aria-hidden="true"></canvas>

    <div id="app">
      <!-- Title area (replaces plain h1) -->
      <div id="title-area" class="title-area">
        <div class="title-ornament-top"><span>✦</span></div>
        <h1 class="title-zh">情書</h1>
        <p  class="title-en">Love&thinsp;Letter</p>
        <div class="title-ornament-bottom">❦</div>
      </div>

      <!-- 主選單區域 -->
      <div id="main-menu" class="menu-container glass-panel">
        <span class="corner-bl" aria-hidden="true">◈</span>
        <span class="corner-br" aria-hidden="true">◈</span>
        <div class="panel-inner-border" aria-hidden="true"></div>
        <div class="panel-title">
          <h2 data-i18n="menu.main">主&ensp;選&ensp;單</h2>
        </div>
        <div class="panel-divider" aria-hidden="true">❧</div>
        <div class="menu-buttons">
          <button id="start-game-btn" class="menu-btn primary" data-i18n="menu.startGame">開始遊戲</button>
          <button id="show-rules-btn" class="menu-btn" data-i18n="menu.gameRules">遊戲說明</button>
          <button id="settings-btn" class="menu-btn" data-i18n="settings.title">遊戲設置</button>
        </div>
      </div>

      <!-- 模式選擇區域 -->
      <div id="mode-select" class="menu-container glass-panel" style="display: none;">
        <span class="corner-bl" aria-hidden="true">◈</span>
        <span class="corner-br" aria-hidden="true">◈</span>
        <div class="panel-inner-border" aria-hidden="true"></div>
        <div class="panel-title">
          <h2 data-i18n="menu.selectMode">選擇遊戲模式</h2>
        </div>
        <div class="panel-divider" aria-hidden="true">❧</div>
        <div class="menu-buttons">
          <button id="online-mode-btn" class="menu-btn primary" data-i18n="menu.onlineMode">多人連線大廳 (PVP)</button>
          <button id="local-mode-btn" class="menu-btn primary" data-i18n="menu.localMode">電腦對戰 (單機)</button>
          <button id="back-to-menu-btn" class="menu-btn secondary" data-i18n="menu.back">返回</button>
        </div>
      </div>

      <!-- 電腦人數選擇 -->
      <!-- 遊戲設定（電腦人數 / 難度 / 冠軍硬幣數） -->
      <div id="bot-settings-select" class="menu-container glass-panel" style="display: none;">
        <span class="corner-bl" aria-hidden="true">◈</span>
        <span class="corner-br" aria-hidden="true">◈</span>
        <div class="panel-inner-border" aria-hidden="true"></div>
        <div class="panel-title">
          <h2 data-i18n="menu.botSettings">遊戲設定</h2>
        </div>
        <div class="panel-divider" aria-hidden="true">❧</div>
        <div class="settings-rows">
          <!-- 電腦人數 -->
          <div class="settings-row">
            <span class="settings-label" data-i18n="menu.botCount">電腦人數</span>
            <div class="settings-selector">
              <button class="diff-arrow" id="botcount-arrow-left">◀</button>
              <span class="settings-value" id="botcount-value"></span>
              <button class="diff-arrow" id="botcount-arrow-right">▶</button>
            </div>
          </div>
          <!-- 電腦難度 -->
          <div class="settings-row">
            <span class="settings-label" data-i18n="menu.botDifficulty">電腦難度</span>
            <div class="settings-selector">
              <button class="diff-arrow" id="difficulty-arrow-left">◀</button>
              <span class="settings-value" id="difficulty-value"></span>
              <button class="diff-arrow" id="difficulty-arrow-right">▶</button>
            </div>
          </div>
          <!-- 冠軍硬幣數 -->
          <div class="settings-row">
            <span class="settings-label" data-i18n="menu.championCoins">冠軍硬幣數</span>
            <div class="settings-selector">
              <button class="diff-arrow" id="coins-arrow-left">◀</button>
              <span class="settings-value" id="coins-value"></span>
              <button class="diff-arrow" id="coins-arrow-right">▶</button>
            </div>
          </div>
        </div>
        <div class="panel-divider" aria-hidden="true">❧</div>
        <div class="menu-buttons" style="gap: 0.6rem;">
          <button id="bot-settings-start-btn" class="menu-btn primary" data-i18n="menu.startGame">開始遊戲</button>
          <button id="bot-settings-back-btn" class="menu-btn secondary" data-i18n="menu.back">返回</button>
        </div>
      </div>

      <!-- 多人連線大廳 -->
      <div id="lobby-scene" class="area lobby-scene" style="display: none;">
        <div class="scene-header">
          <div>
            <h2 data-i18n="lobby.title">多人連線大廳</h2>
            <p data-i18n="lobby.desc">建立或加入一個 2-4 人的情書房間。</p>
          </div>
          <button id="back-to-mode-from-lobby-btn" class="menu-btn secondary" data-i18n="menu.back">返回</button>
        </div>

        <div class="lobby-actions">
          <button id="create-room-btn" class="menu-btn primary" data-i18n="lobby.create">創建房間</button>
          <button id="refresh-room-list-btn" class="menu-btn secondary" data-i18n="lobby.refresh">重新整理</button>
        </div>

        <div id="room-list-container" class="room-list-container" aria-live="polite"></div>
      </div>

      <!-- 房間等待畫面 -->
      <div id="room-wait-scene" class="area room-wait-scene" style="display: none;">
        <div class="scene-header">
          <div>
            <h2 data-i18n="room.title">房間等待中</h2>
            <p><span data-i18n="room.idLabel">房間 ID：</span><strong id="current-room-id">-</strong></p>
          </div>
          <span id="room-player-count" class="room-count-badge">0/4</span>
        </div>

        <div id="room-player-list" class="room-player-list" aria-live="polite"></div>

        <div class="room-wait-actions">
          <button id="leave-room-btn" class="menu-btn secondary" data-i18n="room.leave">離開房間</button>
          <button id="ready-toggle-btn" class="menu-btn primary" data-i18n="room.ready">準備</button>
        </div>
      </div>

      <!-- 遊戲場景 -->
      <div id="game-scene" style="display: none;">
        <!-- Disconnect banner: shown when a player is disconnected mid-game -->
        <div id="disconnect-banner" style="display:none;"></div>
        <div class="card-stats-area area">
          <h3 data-i18n="game.stats">出牌統計</h3>
          <div id="played-card-stats" class="played-card-stats"></div>
          <button id="stats-next-round-btn" class="result-btn stats-next-round-btn" style="display:none;" data-i18n="btn.nextRound">開始下一局</button>
        </div>
        <!-- 左側/主戰區 -->
        <div class="main-battle-area">
          <!-- 玩家區域（桌機版排最上方，手機版維持原本 order） -->
          <div id="player-area" class="area">
            <h3>玩家狀態</h3>
            <div class="player-body">
              <div id="player-hand-zone" class="zone-box zone-hand">
                <span class="zone-label-text" data-i18n="game.handLabel">手牌</span>
                <div id="player-hand" class="hand-container"></div>
              </div>
              <div id="draw-btn-wrapper">
                <button id="draw-btn-desktop" data-i18n="game.draw">抽牌</button>
              </div>
              <div id="player-discard-zone" class="zone-box zone-discard">
                <span class="zone-label-text" data-i18n="game.discardLabel">棄牌紀錄</span>
                <div id="player-discard" class="discard-container"></div>
              </div>
            </div>
          </div>

          <!-- 對手區域 (動態生成) -->
          <div id="opponents-container"></div>
        </div>

        <!-- 桌機版對戰紀錄面板（手機版隱藏，以 modal 取代） -->
        <div id="game-log-panel" class="area">
          <h3 data-i18n="game.viewLog">對戰紀錄</h3>
          <div id="game-log" class="log-container">
            <p>[系統] 遊戲準備就緒</p>
          </div>
        </div>

        <!-- 右側/控制欄 (側邊欄) -->
        <div class="sidebar-area">
          <div id="game-info-area" class="area">
            <div class="stats">
              <!-- Row 1: 狀態資訊 -->
              <div class="game-top-row">
                <div id="turn-indicator">當前回合：玩家</div>
                <span id="deck-count">牌堆剩餘：0</span>
                <button id="stats-toggle-btn" type="button" class="mobile-stats-toggle"
                        data-i18n="game.statsToggle"
                        aria-controls="played-card-stats" aria-expanded="false">出牌統計</button>
              </div>
              <!-- Row 2: 操作按鈕列 + icon 群 -->
              <div class="game-action-row">
                <button id="draw-btn" data-i18n="game.draw">抽牌</button>
                <button id="show-result-btn" class="result-btn" style="display:none;" data-i18n="game.viewResult">查看結果</button>
                <button id="emoji-btn" type="button" class="menu-btn secondary" style="display:none;" data-i18n="game.emoji">表情輪盤</button>
                <button id="show-log-btn" class="menu-btn secondary" data-i18n="game.viewLog">查看紀錄</button>
                <button id="chat-btn" type="button" class="menu-btn secondary" style="display:none;">
                  聊天室<span id="chat-unread-badge" class="chat-badge" style="display:none;"></span>
                </button>
                <button id="back-home-btn" class="menu-btn secondary" data-i18n="game.backHome">離開遊戲</button>
                <button id="leave-game-btn" class="menu-btn secondary" style="display:none;" data-i18n="btn.leaveGame">離開遊戲</button>
                <!-- 分隔線（桌機版才顯示）+ 麥克風/喇叭 -->
                <div class="top-sep"></div>
                <div class="game-icon-group">
                  <!-- 麥克風（僅多人連線時顯示） -->
                  <button id="mic-btn" type="button" class="icon-btn" aria-label="Toggle mic" style="display:none;">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 80" fill="currentColor">
                      <rect x="20" y="4" width="24" height="38" rx="12"/>
                      <path d="M10 34 Q10 60 32 60 Q54 60 54 34" stroke="currentColor" stroke-width="5" fill="none" stroke-linecap="round"/>
                      <line x1="32" y1="60" x2="32" y2="72" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
                      <line x1="16" y1="72" x2="48" y2="72" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
                    </svg>
                  </button>
                  <!-- 喇叭（SVG，支援 .muted class 切換） -->
                  <button id="mute-btn" type="button" class="icon-btn" aria-label="Toggle mute">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 64" fill="currentColor">
                      <polygon points="6,20 28,20 46,6 46,58 28,44 6,44"/>
                      <path class="sound-waves" d="M54,26 Q60,32 54,38" stroke="currentColor" stroke-width="4.5" fill="none" stroke-linecap="round"/>
                      <path class="sound-waves" d="M60,19 Q72,32 60,45" stroke="currentColor" stroke-width="4.5" fill="none" stroke-linecap="round"/>
                      <path class="sound-waves" d="M66,12 Q82,32 66,52" stroke="currentColor" stroke-width="4.5" fill="none" stroke-linecap="round"/>
                      <line class="muted-x" x1="54" y1="20" x2="76" y2="44" stroke="currentColor" stroke-width="4.5" stroke-linecap="round"/>
                      <line class="muted-x" x1="76" y1="20" x2="54" y2="44" stroke="currentColor" stroke-width="4.5" stroke-linecap="round"/>
                    </svg>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 聊天室 Slide-up Panel（多人連線時使用）-->
    <div id="chat-panel" class="chat-panel" aria-hidden="true">
      <div class="chat-panel-header">
        <span>聊天室</span>
        <button id="chat-close-btn" type="button" class="chat-close-btn" aria-label="關閉聊天室">✕</button>
      </div>
      <div id="chat-messages" class="chat-messages"></div>
      <div class="chat-input-row">
        <input id="chat-input" type="text" placeholder="輸入訊息…" maxlength="200" autocomplete="off">
        <button id="chat-send-btn" type="button" class="chat-send-btn">送出</button>
      </div>
    </div>
    <!-- 聊天室背景遮罩 -->
    <div id="chat-backdrop" class="chat-backdrop"></div>

    <!-- 遊戲設置面板 -->
    <div id="settings-overlay" class="settings-overlay" style="display:none;" role="dialog" aria-modal="true">
      <div class="settings-panel glass-panel">
        <span class="corner-bl" aria-hidden="true">◈</span>
        <span class="corner-br" aria-hidden="true">◈</span>
        <div class="panel-inner-border" aria-hidden="true"></div>
        <div class="panel-title">
          <h2 id="settings-panel-title" data-i18n="settings.title">遊戲設置</h2>
        </div>
        <div class="panel-divider" aria-hidden="true">❧</div>

        <!-- View 1: 主選單 -->
        <div id="settings-main-view">
          <div class="settings-buttons">
            <button id="settings-music-btn" class="menu-btn" data-i18n="settings.musicSettings">音樂設置</button>
            <button id="settings-lang-btn" class="menu-btn" data-i18n="settings.languageSettings">語言設置</button>
          </div>
          <div class="panel-divider" aria-hidden="true">❧</div>
          <div class="settings-buttons">
            <button id="settings-close-btn" class="menu-btn secondary" data-i18n="settings.back">返回</button>
          </div>
        </div>

        <!-- View 2: 音樂設置 -->
        <div id="settings-music-view" style="display:none;">
          <div class="settings-rows">
            <div class="settings-row">
              <span class="settings-label" data-i18n="settings.volume">音量大小</span>
              <div class="settings-selector volume-selector">
                <input id="settings-volume-range" class="settings-volume-range" type="range" min="0" max="100" step="1" value="60" aria-label="音量大小">
                <span class="settings-value settings-volume-value" id="settings-volume-value">60%</span>
              </div>
            </div>
            <div class="settings-row">
              <span class="settings-label" data-i18n="settings.menuMusic">主選單</span>
              <div class="settings-selector">
                <button class="settings-arrow" data-slot="menu" data-dir="-1" aria-label="上一首">◀</button>
                <span class="settings-value" id="settings-value-menu"></span>
                <button class="settings-arrow" data-slot="menu" data-dir="1" aria-label="下一首">▶</button>
              </div>
            </div>
            <div class="settings-row">
              <span class="settings-label" data-i18n="settings.gameMusic">遊戲中</span>
              <div class="settings-selector">
                <button class="settings-arrow" data-slot="game" data-dir="-1" aria-label="上一首">◀</button>
                <span class="settings-value" id="settings-value-game"></span>
                <button class="settings-arrow" data-slot="game" data-dir="1" aria-label="下一首">▶</button>
              </div>
            </div>
            <div class="settings-row">
              <span class="settings-label" data-i18n="settings.winnerMusic">當局勝利</span>
              <div class="settings-selector">
                <button class="settings-arrow" data-slot="winner" data-dir="-1" aria-label="上一首">◀</button>
                <span class="settings-value" id="settings-value-winner"></span>
                <button class="settings-arrow" data-slot="winner" data-dir="1" aria-label="下一首">▶</button>
              </div>
            </div>
            <div class="settings-row">
              <span class="settings-label" data-i18n="settings.loserMusic">當局失敗</span>
              <div class="settings-selector">
                <button class="settings-arrow" data-slot="loser" data-dir="-1" aria-label="上一首">◀</button>
                <span class="settings-value" id="settings-value-loser"></span>
                <button class="settings-arrow" data-slot="loser" data-dir="1" aria-label="下一首">▶</button>
              </div>
            </div>
            <div class="settings-row">
              <span class="settings-label" data-i18n="settings.championMusic">總冠軍</span>
              <div class="settings-selector">
                <button class="settings-arrow" data-slot="champion" data-dir="-1" aria-label="上一首">◀</button>
                <span class="settings-value" id="settings-value-champion"></span>
                <button class="settings-arrow" data-slot="champion" data-dir="1" aria-label="下一首">▶</button>
              </div>
            </div>
          </div>
          <div class="panel-divider" aria-hidden="true">❧</div>
          <div class="settings-buttons">
            <button id="settings-confirm-btn" class="menu-btn primary" data-i18n="settings.confirm">確認</button>
            <button id="settings-back-btn" class="menu-btn secondary" data-i18n="settings.back">返回</button>
          </div>
        </div>

      </div>
    </div>

    <!-- 全域 Modal 彈窗 -->
    <div id="modal-overlay" class="modal-overlay" style="display: none;">
      <div id="modal-content" class="modal-content">
        <h2 id="modal-title">標題</h2>
        <div id="modal-body">
          <!-- 內容會由 JS 動態生成 -->
        </div>
        <div id="modal-footer" style="margin-top: 20px;">
          <!-- 按鈕 -->
        </div>
      </div>
    </div>

    <button id="mute-btn-global" aria-label="Toggle mute">🔊</button>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
